metadata:
  document_id: codex-evidence-touchpoint-index-v1
  version: 1
  status: active
  canonical_name: codex-evidence-touchpoint-index
  purpose: >
    Reverse lookup from file or concern to the owning feature.
  repository_root: <repo-root>

touchpoints:
  - touchpoint_id: repository-bootstrap-governance
    files:
      - AGENTS.md
      - docs/repository-genesis/repository-init-manifest.v1.yaml
      - docs/current-state/index/current-state-root.v1.yaml
      - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
    concerns:
      - repository bootstrap governance
      - current-state onboarding entrypoint
    features:
      - repository-bootstrap
  - touchpoint_id: spec-first-entrypoint
    files:
      - specs/README.md
      - docs/session_handoffs/session_handoff_template.md
      - docs/session_handoffs/session_checkpoint_template.md
      - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
    concerns:
      - spec-first workflow
      - pre-implementation handoff contract
    features:
      - repository-bootstrap
  - touchpoint_id: current-state-validation
    files:
      - scripts/validate_current_state_docs.py
      - docs/current-state/index/current-state-root.v1.yaml
      - docs/current-state/index/feature-manifest.v1.yaml
      - docs/current-state/index/runtime-topology.v1.yaml
      - docs/current-state/index/touchpoint-index.v1.yaml
    concerns:
      - current-state validation
      - onboarding quality gate
    features:
      - repository-bootstrap
  - touchpoint_id: public-product-implementation
    files:
      - pyproject.toml
      - src/codex_evidence
      - tests
      - README.md
      - docs/architecture.md
      - docs/privacy.md
      - docs/rollback.md
      - docs/testing.md
    concerns:
      - public CLI package
      - evidence store
      - read-only MCP
      - local runtime registration
      - public MVP tests
    features:
      - codex-evidence-public-product
  - touchpoint_id: public-product-release-and-application
    files:
      - docs/release-notes-v0.1.0.md
      - docs/release-checklist-v0.1.0.md
      - docs/codex-for-oss-application.md
      - docs/dogfood-proof.md
      - docs/roadmap.md
      - docs/provenance.md
      - docs/migration-session-memo.md
    concerns:
      - public beta release
      - Codex for OSS application packet
      - dogfood proof
      - roadmap
      - provenance
    features:
      - codex-evidence-public-product
  - touchpoint_id: public-product-spec
    files:
      - specs/codex-evidence-public-product/requirements.md
      - specs/codex-evidence-public-product/design.md
      - specs/codex-evidence-public-product/tasks.yaml
      - specs/codex-evidence-public-product/traceability.csv
      - specs/codex-evidence-public-product/worklog.ndjson
    concerns:
      - future work entrypoint
      - migrated public-product evidence
      - SDD-TDD-EDD continuity
    features:
      - codex-evidence-public-product
  - touchpoint_id: public-beta-hardening-plan
    files:
      - docs/development-plan.md
      - docs/current-state/features/public-beta-hardening/feature-detail.v1.yaml
      - specs/public-beta-hardening/requirements.md
      - specs/public-beta-hardening/design.md
      - specs/public-beta-hardening/tasks.yaml
      - specs/public-beta-hardening/traceability.csv
      - specs/public-beta-hardening/worklog.ndjson
    concerns:
      - roadmap execution
      - next-session handoff
      - public beta hardening
      - SDD-TDD-EDD planning
    features:
      - public-beta-hardening

reverse_lookup_notes:
  - Future product work should start from codex-evidence-public-product.
  - The next planned implementation feature is public-beta-hardening.
  - repository-bootstrap remains only the governance and genesis feature.

confidence_and_gaps:
  confidence: high
  evidence:
    - AGENTS.md
    - docs/repository-genesis/repository-init-manifest.v1.yaml
    - specs/README.md
    - scripts/validate_current_state_docs.py
    - docs/current-state/features/codex-evidence-public-product/feature-detail.v1.yaml
  open_questions: []

