metadata:
  document_id: codex-evidence-runtime-topology-v1
  version: 1
  status: active
  canonical_name: codex-evidence-runtime-topology
  purpose: >
    Runtime topology for constrained-index-first current-state docs.
  repository_root: <repo-root>

runtimes:
  - runtime_id: repo-governance-docs
    kind: bootstrap-docs-plus-validator
    status: active
    files:
      - AGENTS.md
      - docs/repository-genesis/repository-init-manifest.v1.yaml
      - docs/current-state/index/current-state-root.v1.yaml
      - docs/current-state/index/documentation-system-method.v1.yaml
      - docs/current-state/index/feature-manifest.v1.yaml
      - docs/current-state/index/runtime-topology.v1.yaml
      - docs/current-state/index/touchpoint-index.v1.yaml
      - docs/current-state/index/capability-tree.v1.yaml
      - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
      - specs/README.md
      - scripts/validate_current_state_docs.py
    responsibilities:
      - Publish the repository bootstrap contract and constrained-index-first lookup docs.
      - Keep spec-first entrypoints discoverable before product code is extracted.
      - Provide a repo-local validation command for future onboarding and maintenance.
  - runtime_id: public-cli-package
    kind: python-cli-package
    status: active
    files:
      - pyproject.toml
      - src/codex_evidence
      - tests
    responsibilities:
      - Provide the public `codex-evidence` CLI and package code.
      - Keep the implemented MVP boundary separate from future gated extensions.
      - Pass compileall and pytest before release or migration commits.
  - runtime_id: read-only-mcp-surface
    kind: mcp-server
    status: active
    files:
      - src/codex_evidence/mcp_server.py
      - src/codex_evidence/_mcp
      - tests/test_mcp_readonly.py
    responsibilities:
      - Expose evidence search and context tools without mutating the database.
      - Preserve the read-only public trust boundary.
  - runtime_id: local-runtime-registration
    kind: local-runtime-helpers
    status: active
    files:
      - src/codex_evidence/production.py
      - src/codex_evidence/runtime_doctor.py
      - src/codex_evidence/_runtime
      - src/codex_evidence/_runtime_doctor
      - docs/rollback.md
    responsibilities:
      - Support explicit local install, doctor, hook registration, MCP registration, and rollback.
      - Keep runtime mutation opt-in and reversible.
  - runtime_id: public-docs-and-specs
    kind: docs-and-specs
    status: active
    files:
      - README.md
      - docs
      - specs/codex-evidence-public-product
    responsibilities:
      - Publish public docs, release notes, roadmap, provenance, and future work entrypoints.
      - Keep private-origin evidence sanitized.
      - Keep next-session handoff and feature specs discoverable.

canonical_paths:
  - path_id: repository-governance-bootstrap
    chain:
      - repo-governance-docs
    used_by:
      - repository-bootstrap
  - path_id: public-product-runtime
    chain:
      - public-cli-package
      - read-only-mcp-surface
      - local-runtime-registration
    used_by:
      - codex-evidence-public-product
  - path_id: public-product-docs
    chain:
      - public-docs-and-specs
    used_by:
      - codex-evidence-public-product

variant_policy:
  canonical_current_docs: docs/current-state/index + docs/current-state/features
  retained_supporting_docs: []
  generated_views:
    - local-only ignored session-cutoff outputs under .serena/, docs/session_handoffs/, and docs/session_state/

confidence_and_gaps:
  confidence: high
  evidence:
    - AGENTS.md
    - docs/repository-genesis/repository-init-manifest.v1.yaml
    - docs/current-state/features/repository-bootstrap/feature-detail.v1.yaml
    - docs/current-state/features/codex-evidence-public-product/feature-detail.v1.yaml
    - specs/README.md
    - scripts/validate_current_state_docs.py
  open_questions: []

