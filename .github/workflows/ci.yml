name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Compile Python files
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m compileall -q src tests scripts

      - name: Run tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q

      - name: Run public hygiene gate
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/check_public_hygiene.py .

      - name: Validate current-state docs
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python scripts/validate_current_state_docs.py --repo-root . --mode all
